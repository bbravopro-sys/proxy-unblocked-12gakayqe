<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Proxy</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #0f0f0f;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 16px;
    }
    h1 { font-size: 1.4rem; opacity: 0.7; }
    .bar {
      display: flex;
      width: min(600px, 90vw);
      gap: 8px;
    }
    input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #fff;
      font-size: 1rem;
      outline: none;
    }
    input:focus { border-color: #555; }
    button {
      padding: 12px 20px;
      border-radius: 8px;
      background: #fff;
      color: #000;
      border: none;
      font-weight: 600;
      cursor: pointer;
      font-size: 1rem;
    }
    button:hover { background: #ddd; }
    small { opacity: 0.4; font-size: 0.8rem; }
  </style>
</head>
<body>
  <h1>🌐 Web Proxy</h1>
  <div class="bar">
    <input id="url" type="text" placeholder="Enter a URL, e.g. google.com" />
    <button onclick="go()">Go</button>
  </div>
  <small>Press Enter or click Go to browse</small>

  <script>
    document.getElementById("url").addEventListener("keydown", e => {
      if (e.key === "Enter") go();
    });

    function go() {
      let url = document.getElementById("url").value.trim();
      if (!url) return;
      if (!/^https?:\/\//i.test(url)) url = "https://" + url;
      window.location.href = "/api/proxy?url=" + encodeURIComponent(url);
    }
  </script>
</body>
</html>
